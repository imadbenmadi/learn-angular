<div class="stars" [class.disabled]="disabled">
    <button
        type="button"
        *ngFor="let s of stars()"
        (click)="setValue(s)"
        [disabled]="disabled"
        [class.filled]="s <= value"
        [attr.aria-label]="'Set rating to ' + s"
        [attr.aria-pressed]="s <= value"
    >
        {{ s <= value ? "★" : "☆" }}
    </button>
</div>
