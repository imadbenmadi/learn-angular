<div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h4 mb-0">{{ isEditMode ? "Edit task" : "New task" }}</h1>
    <button class="btn btn-outline-secondary" type="button" (click)="cancel()">
        Cancel
    </button>
</div>

<div *ngIf="errorMessage" class="alert alert-danger" role="alert">
    {{ errorMessage }}
</div>

<div *ngIf="isLoading" class="alert alert-info" role="alert">Loading…</div>

<form
    *ngIf="!isLoading"
    [formGroup]="form"
    (ngSubmit)="submit()"
    class="card shadow-sm"
>
    <div class="card-body">
        <div class="mb-3">
            <label for="title" class="form-label">Title</label>
            <input
                id="title"
                class="form-control"
                type="text"
                formControlName="title"
                [class.is-invalid]="
                    form.controls.title.touched && form.controls.title.invalid
                "
            />
            <div class="invalid-feedback">
                Title must be at least 2 characters.
            </div>
        </div>

        <div class="mb-3">
            <label for="description" class="form-label">Description</label>
            <textarea
                id="description"
                class="form-control"
                rows="3"
                formControlName="description"
            ></textarea>
            <div class="form-text">
                Optional: keep a short note about the task.
            </div>
        </div>

        <div class="row">
            <div class="col-12 col-md-6 mb-3">
                <label for="status" class="form-label">Status</label>
                <select
                    id="status"
                    class="form-select"
                    formControlName="status"
                >
                    <option *ngFor="let status of statuses" [ngValue]="status">
                        {{ status }}
                    </option>
                </select>
            </div>

            <div class="col-12 col-md-6 mb-3">
                <label for="dueDate" class="form-label">Due date</label>
                <input
                    id="dueDate"
                    class="form-control"
                    type="date"
                    formControlName="dueDate"
                />
                <div class="form-text">Optional.</div>
            </div>
        </div>

        <button class="btn btn-primary" type="submit" [disabled]="isSubmitting">
            {{ isSubmitting ? "Saving…" : "Save" }}
        </button>
    </div>
</form>
