<div class="container orders-page">
    <div class="page-header">
        <div>
            <h1>Orders</h1>
            <p class="text-muted">Your recent orders</p>
        </div>
        <a class="btn btn-secondary" routerLink="/profile">Back</a>
    </div>

    <div class="alert alert-error" *ngIf="errorMessage">{{ errorMessage }}</div>

    <div class="loading" *ngIf="isLoading">Loading orders...</div>

    <div
        class="alert alert-info"
        *ngIf="!isLoading && !errorMessage && orders.length === 0"
    >
        No orders yet.
    </div>

    <div class="card" *ngIf="!isLoading && orders.length > 0">
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Order</th>
                        <th>Status</th>
                        <th class="text-right">Total</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let o of orders">
                        <td>{{ o.orderId || o._id }}</td>
                        <td>{{ o.status }}</td>
                        <td class="text-right">₹{{ o.totalAmount }}</td>
                        <td>{{ o.createdAt | date: "mediumDate" }}</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
