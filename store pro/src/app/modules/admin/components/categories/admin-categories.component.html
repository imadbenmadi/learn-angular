<div class="page">
    <div class="card form-card">
        <div class="card-header">
            {{ editingId ? "Edit Category" : "Create Category" }}
        </div>

        <div class="alert alert-error" *ngIf="errorMessage">
            {{ errorMessage }}
        </div>
        <div class="alert alert-success" *ngIf="successMessage">
            {{ successMessage }}
        </div>

        <form [formGroup]="form" (ngSubmit)="submit()">
            <div class="grid">
                <div class="form-group">
                    <label>Name</label>
                    <input formControlName="name" />
                </div>
                <div class="form-group">
                    <label>Slug</label>
                    <input
                        formControlName="slug"
                        placeholder="e.g. electronics"
                    />
                </div>
                <div class="form-group full">
                    <label>Description (optional)</label>
                    <textarea rows="2" formControlName="description"></textarea>
                </div>
                <div class="form-group full">
                    <label>Image URL (optional)</label>
                    <input formControlName="image" />
                </div>
                <div class="form-group">
                    <label>Active</label>
                    <select formControlName="isActive">
                        <option [ngValue]="true">Active</option>
                        <option [ngValue]="false">Inactive</option>
                    </select>
                </div>
            </div>

            <div class="card-footer actions">
                <button
                    class="btn btn-secondary"
                    type="button"
                    (click)="startCreate()"
                >
                    Clear
                </button>
                <button
                    class="btn btn-primary"
                    type="submit"
                    [disabled]="isSaving"
                >
                    {{
                        isSaving ? "Saving..." : editingId ? "Update" : "Create"
                    }}
                </button>
            </div>
        </form>
    </div>

    <div class="card mt">
        <div class="card-header">Categories</div>

        <div class="loading" *ngIf="isLoading">Loading categories...</div>

        <div class="table-wrap" *ngIf="!isLoading">
            <table>
                <thead>
                    <tr>
                        <th style="width: 40%">Category</th>
                        <th>Slug</th>
                        <th>Status</th>
                        <th style="width: 180px">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let c of categories">
                        <td>
                            <div class="name">{{ c.name }}</div>
                            <small class="text-muted">{{
                                c.description || ""
                            }}</small>
                        </td>
                        <td>{{ c.slug }}</td>
                        <td>
                            <span
                                class="badge"
                                [class.badge-muted]="!c.isActive"
                            >
                                {{ c.isActive ? "Active" : "Inactive" }}
                            </span>
                        </td>
                        <td>
                            <div class="row-actions">
                                <button
                                    class="btn btn-secondary btn-sm"
                                    (click)="startEdit(c)"
                                >
                                    Edit
                                </button>
                                <button
                                    class="btn btn-danger btn-sm"
                                    (click)="delete(c)"
                                >
                                    Delete
                                </button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>

            <div class="alert alert-info" *ngIf="categories.length === 0">
                No categories found.
            </div>
        </div>
    </div>
</div>
