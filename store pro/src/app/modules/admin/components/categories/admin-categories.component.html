<div class="page">
    <div class="card form-card">
        <div class="card-header">
            {{ editingId ? "Edit Category" : "Create Category" }}
        </div>

        <div class="alert alert-error" *ngIf="errorMessage">
            {{ errorMessage }}
        </div>
        <div class="alert alert-success" *ngIf="successMessage">
            {{ successMessage }}
        </div>

        <form [formGroup]="form" (ngSubmit)="submit()">
            <div class="grid">
                <div class="form-group">
                    <label>Name</label>
                    <input formControlName="name" />
                </div>
                <div class="form-group">
                    <label>Slug</label>
                    <input
                        formControlName="slug"
                        placeholder="e.g. electronics"
                    />
                </div>
                <div class="form-group full">
                    <label>Description (optional)</label>
                    <textarea rows="2" formControlName="description"></textarea>
                </div>
                <div class="form-group full">
                    <label>Image URL (optional)</label>
                    <input formControlName="image" />
                </div>
                <div class="form-group">
                    <label>Active</label>
                    <select formControlName="isActive">
                        <option [ngValue]="true">Active</option>
                        <option [ngValue]="false">Inactive</option>
                    </select>
                </div>
            </div>

            <div class="card-footer actions">
                <button
                    class="btn btn-secondary"
                    type="button"
                    (click)="startCreate()"
                >
                    Clear
                </button>
                <button
                    class="btn btn-primary"
                    type="submit"
                    [disabled]="isSaving"
                >
                    {{
                        isSaving ? "Saving..." : editingId ? "Update" : "Create"
                    }}
                </button>
            </div>
        </form>
    </div>

    <div class="card mt">
        <div class="card-header">Categories</div>

        <div class="loading" *ngIf="isLoading">Loading categories...</div>

        <div class="table-wrap" *ngIf="!isLoading">
            <ag-grid-angular
                class="ag-theme-alpine"
                style="width: 100%; height: 420px"
                [rowData]="categories"
                [columnDefs]="columnDefs"
                [defaultColDef]="defaultColDef"
                [context]="context"
                (gridReady)="onGridReady($event)"
            ></ag-grid-angular>

            <div class="alert alert-info" *ngIf="categories.length === 0">
                No categories found.
            </div>
        </div>
    </div>
</div>
