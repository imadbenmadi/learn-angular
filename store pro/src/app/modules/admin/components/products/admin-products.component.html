<div class="page">
    <div class="card form-card">
        <div class="card-header">
            {{ editingId ? "Edit Product" : "Create Product" }}
        </div>

        <div class="alert alert-error" *ngIf="errorMessage">
            {{ errorMessage }}
        </div>
        <div class="alert alert-success" *ngIf="successMessage">
            {{ successMessage }}
        </div>

        <form [formGroup]="form" (ngSubmit)="submit()">
            <div class="grid">
                <div class="form-group">
                    <label>Name</label>
                    <input formControlName="name" />
                </div>
                <div class="form-group">
                    <label>SKU</label>
                    <input formControlName="sku" />
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select formControlName="category">
                        <option value="">Select...</option>
                        <option
                            *ngFor="let c of categories"
                            [value]="c.id || c._id"
                        >
                            {{ c.name }}
                        </option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Stock</label>
                    <input type="number" min="0" formControlName="stock" />
                </div>
                <div class="form-group">
                    <label>Price</label>
                    <input
                        type="number"
                        min="0"
                        step="0.01"
                        formControlName="price"
                    />
                </div>
                <div class="form-group">
                    <label>Sale Price (optional)</label>
                    <input
                        type="number"
                        min="0"
                        step="0.01"
                        formControlName="salePrice"
                    />
                </div>
                <div class="form-group full">
                    <label>Image URL</label>
                    <input formControlName="image" />
                </div>
                <div class="form-group full">
                    <label>Description</label>
                    <textarea rows="3" formControlName="description"></textarea>
                </div>
                <div class="form-group">
                    <label>Active</label>
                    <select formControlName="isActive">
                        <option [ngValue]="true">Active</option>
                        <option [ngValue]="false">Inactive</option>
                    </select>
                </div>
            </div>

            <div class="card-footer actions">
                <button
                    class="btn btn-secondary"
                    type="button"
                    (click)="startCreate()"
                >
                    Clear
                </button>
                <button
                    class="btn btn-primary"
                    type="submit"
                    [disabled]="isSaving"
                >
                    {{
                        isSaving ? "Saving..." : editingId ? "Update" : "Create"
                    }}
                </button>
            </div>
        </form>
    </div>

    <div class="card mt">
        <div class="card-header">Products</div>

        <div class="loading" *ngIf="isLoading">Loading products...</div>

        <div class="table-wrap" *ngIf="!isLoading">
            <ag-grid-angular
                class="ag-theme-alpine"
                style="width: 100%; height: 520px"
                [rowData]="products"
                [columnDefs]="columnDefs"
                [defaultColDef]="defaultColDef"
                [context]="context"
                (gridReady)="onGridReady($event)"
            ></ag-grid-angular>

            <div class="alert alert-info" *ngIf="products.length === 0">
                No products found.
            </div>
        </div>
    </div>
</div>
