<div class="orders-page">
    <div class="card">
        <div class="card-header header-row">
            <div>
                Orders
                <div class="text-muted sub">Manage customer orders</div>
            </div>
            <div class="filters">
                <label class="text-muted">Status</label>
                <select
                    [ngModel]="statusFilter"
                    (ngModelChange)="applyStatusFilter($event)"
                >
                    <option value="">All</option>
                    <option *ngFor="let s of statuses" [value]="s">
                        {{ s }}
                    </option>
                </select>
            </div>
        </div>

        <div class="alert alert-error" *ngIf="errorMessage">
            {{ errorMessage }}
        </div>
        <div class="loading" *ngIf="isLoading">Loading orders...</div>

        <div class="table-wrap" *ngIf="!isLoading">
            <ag-grid-angular
                class="ag-theme-alpine"
                style="width: 100%; height: 520px"
                [rowData]="orders"
                [columnDefs]="columnDefs"
                [defaultColDef]="defaultColDef"
                [context]="context"
                (gridReady)="onGridReady($event)"
            ></ag-grid-angular>

            <div class="alert alert-info" *ngIf="orders.length === 0">
                No orders found.
            </div>
        </div>

        <div
            class="card-footer pager"
            *ngIf="!isLoading && totalItems > itemsPerPage"
        >
            <button
                class="btn btn-secondary btn-sm"
                (click)="previousPage()"
                [disabled]="currentPage === 1"
            >
                Previous
            </button>
            <small class="text-muted"
                >Page {{ currentPage }} / {{ getTotalPages() }}</small
            >
            <button
                class="btn btn-secondary btn-sm"
                (click)="nextPage()"
                [disabled]="currentPage >= getTotalPages()"
            >
                Next
            </button>
        </div>
    </div>
</div>
