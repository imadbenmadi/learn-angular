<div class="container checkout-page">
    <div class="page-header">
        <div>
            <h1>Checkout</h1>
            <p class="text-muted">
                Enter shipping details and place your order.
            </p>
        </div>
        <button class="btn btn-secondary" (click)="goToCart()">
            Back to cart
        </button>
    </div>

    <div class="alert alert-error" *ngIf="errorMessage">{{ errorMessage }}</div>
    <div class="alert alert-success" *ngIf="successMessage">
        {{ successMessage }}
    </div>

    <div class="layout" *ngIf="cart as c">
        <div class="card">
            <div class="card-header">Shipping Details</div>
            <form [formGroup]="form" (ngSubmit)="placeOrder()">
                <div class="grid">
                    <div class="form-group">
                        <label>First Name</label>
                        <input formControlName="firstName" />
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input formControlName="lastName" />
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input formControlName="email" type="email" />
                    </div>
                    <div class="form-group">
                        <label>Phone</label>
                        <input formControlName="phone" />
                    </div>
                    <div class="form-group full">
                        <label>Street</label>
                        <input formControlName="street" />
                    </div>
                    <div class="form-group">
                        <label>City</label>
                        <input formControlName="city" />
                    </div>
                    <div class="form-group">
                        <label>State</label>
                        <input formControlName="state" />
                    </div>
                    <div class="form-group">
                        <label>Postal Code</label>
                        <input formControlName="postalCode" />
                    </div>
                    <div class="form-group">
                        <label>Country</label>
                        <input formControlName="country" />
                    </div>
                    <div class="form-group full">
                        <label>Payment Method</label>
                        <select formControlName="paymentMethod">
                            <option value="credit_card">Credit Card</option>
                            <option value="debit_card">Debit Card</option>
                            <option value="paypal">PayPal</option>
                            <option value="bank_transfer">Bank Transfer</option>
                        </select>
                    </div>
                </div>

                <div class="card-footer actions">
                    <button
                        class="btn btn-primary"
                        type="submit"
                        [disabled]="isSubmitting || c.items.length === 0"
                    >
                        {{ isSubmitting ? "Placing order..." : "Place order" }}
                    </button>
                </div>
            </form>
        </div>

        <div class="card summary">
            <div class="card-header">Order Summary</div>
            <div class="summary-row">
                <span class="text-muted">Items</span>
                <span>{{ c.totalItems }}</span>
            </div>
            <div class="summary-row">
                <span class="text-muted">Total</span>
                <span>₹{{ c.totalPrice }}</span>
            </div>
            <small class="text-muted">
                You must be logged in to place an order.
            </small>
        </div>
    </div>
</div>
